# Enables scheduled backups of specific directories on the server
- name: 'Backups'
  hosts: all
  become: true
  tags: backups
  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  tasks:
    - name: Configure Borg backups
      block:
        - name: Include Borg role
          ansible.builtin.include_role:
            name: borg
          when: borg_enabled | default(true)
      rescue:
        - name: Handle Borg role failure
          ansible.builtin.debug:
            msg: "⚠️ Borg role failed. Continuing with next role."
      always:
        - name: Clear any failure flag so next roles still run
          ansible.builtin.meta: clear_host_errors
