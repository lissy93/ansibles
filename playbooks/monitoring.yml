# Configures logging, metrics and monitoring
# Stack: Node Exporter → Prometheus → Grafana (metrics)
#        Promtail → Loki → Grafana (logs)
#        Monit (process auto-restart)

- name: 'Monitoring: Clean up replaced services'
  hosts: all
  become: true
  tags: monitoring
  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  tasks:
    - name: Stop and disable replaced monitoring services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - grafana-agent
        - blackbox_exporter
        - atop
        - atopacct
        - pmcd
        - pmie
        - pmie_farm
        - pmlogger
        - pmlogger_farm
        - pmproxy
      failed_when: false

    - name: Remove PCP packages (redundant with Prometheus)
      ansible.builtin.apt:
        name:
          - pcp
          - cockpit-pcp
        state: absent
        autoremove: true
      failed_when: false

    - name: Remove atop package (redundant with Node Exporter)
      ansible.builtin.apt:
        name:
          - atop
        state: absent
        autoremove: true
      failed_when: false

- name: 'Monitoring'
  hosts: all
  become: true
  tags: monitoring
  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  tasks:
    - name: Include monit role
      ansible.builtin.include_role:
        name: monit
        apply:
          tags: [monit]
      when: monit_enabled | default(true)
      tags: [monit]
      ignore_errors: true  # noqa ignore-errors

    - name: Include logrotate role
      ansible.builtin.include_role:
        name: logrotate
        apply:
          tags: [logrotate]
      when: logrotate_enabled | default(true)
      tags: [logrotate]
      ignore_errors: true  # noqa ignore-errors

    - name: Include node_exporter role
      ansible.builtin.include_role:
        name: node_exporter
        apply:
          tags: [node_exporter]
      when: node_exporter_enabled | default(true)
      tags: [node_exporter]
      ignore_errors: true  # noqa ignore-errors

    - name: Include prometheus role
      ansible.builtin.include_role:
        name: prometheus
        apply:
          tags: [prometheus]
      when: prometheus_enabled | default(true)
      tags: [prometheus]
      ignore_errors: true  # noqa ignore-errors

    - name: Include loki role
      ansible.builtin.include_role:
        name: loki
        apply:
          tags: [loki]
      when: loki_enabled | default(true)
      tags: [loki]
      ignore_errors: true  # noqa ignore-errors

    - name: Include promtail role
      ansible.builtin.include_role:
        name: promtail
        apply:
          tags: [promtail]
      when: promtail_enabled | default(true)
      tags: [promtail]
      ignore_errors: true  # noqa ignore-errors

    - name: Include grafana role
      ansible.builtin.include_role:
        name: grafana
        apply:
          tags: [grafana]
      when: grafana_enabled | default(true)
      tags: [grafana]
      ignore_errors: true  # noqa ignore-errors
