# Basic server setup, to always be run on everything
# Sets up packages, users, ssh, time, host, firewall, system tuning

- name: 'Essentials: General system configuration'
  hosts: all
  become: true
  tags: essentials

  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  tasks:
    - name: Include installs role
      ansible.builtin.include_role:
        name: installs
        apply:
          tags: [installs]
      when: installs_enabled | default(true)
      tags: [installs]
      ignore_errors: true  # noqa ignore-errors

    - name: Include users role
      ansible.builtin.include_role:
        name: users
        apply:
          tags: [users]
      when: users_enabled | default(true)
      tags: [users]
      ignore_errors: true  # noqa ignore-errors

    - name: Include directories role
      ansible.builtin.include_role:
        name: directories
        apply:
          tags: [directories]
      when: directories_enabled | default(true)
      tags: [directories]
      ignore_errors: true  # noqa ignore-errors

    - name: Include timezone role
      ansible.builtin.include_role:
        name: timezone
        apply:
          tags: [timezone]
      when: timezone_enabled | default(true)
      tags: [timezone]
      ignore_errors: true  # noqa ignore-errors

    - name: Include hostname role
      ansible.builtin.include_role:
        name: hostname
        apply:
          tags: [hostname]
      when: hostname_enabled | default(true)
      tags: [hostname]
      ignore_errors: true  # noqa ignore-errors

    - name: Include firewall role
      ansible.builtin.include_role:
        name: firewall
        apply:
          tags: [firewall]
      when: firewall_enabled | default(true)
      tags: [firewall]
      ignore_errors: true  # noqa ignore-errors

- name: 'Essentials: System tuning (swap, OOM protection, kernel params)'
  hosts: all
  become: true
  tags: essentials
  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  tasks:
    - name: Include system-tuning role
      ansible.builtin.include_role:
        name: system-tuning
        apply:
          tags: [system-tuning]
      when: system_tuning_enabled | default(true)
      tags: [system-tuning]
      ignore_errors: true  # noqa ignore-errors

    - name: Include debloat role
      ansible.builtin.include_role:
        name: debloat
        apply:
          tags: [debloat]
      when: debloat_enabled | default(true)
      tags: [debloat]
      ignore_errors: true  # noqa ignore-errors

- name: 'Essentials: SSH config - pre-lockdown'
  hosts: all
  become: true
  roles:
    - role: ssh
      vars:
        ssh_lockdown: false

- name: 'Essentials: Verify SSH access for user'
  hosts: all
  remote_user: "{{ new_user }}"
  gather_facts: false
  tasks:
    - name: Attempt to login as {{ new_user }}
      ansible.builtin.ping:
      register: ping_result
      failed_when: ping_result.ping != 'pong'
    - name: Mark this host as ready for lockdown
      ansible.builtin.set_fact:
        user_ready: true

- name: 'Essentials: SSH config - Prevent root login'
  hosts: all
  become: true
  roles:
    - role: ssh
      vars:
        ssh_lockdown: true
      when: user_ready | default(false)
  tags: essentials
