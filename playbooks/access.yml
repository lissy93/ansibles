# Configures easy access to the server via Cockpit (web UI) and Tailscale (VPN)

- name: Access
  hosts: all
  become: true
  tags: access

  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  tasks:
    - name: Configure Tailscale VPN
      block:
        - name: Include Tailscale role
          ansible.builtin.include_role:
            name: tailscale
          when: tailscale_enabled | default(true)
      rescue:
        - name: Handle Tailscale role failure
          ansible.builtin.debug:
            msg: "⚠️ tailscale role failed. Continuing with next role."
      always:
        - name: Clear any failure flag so next roles still run
          ansible.builtin.meta: clear_host_errors

    - name: Include Cockpit role
      ansible.builtin.include_role:
        name: cockpit
        apply:
          tags: [cockpit]
      when: cockpit_enabled | default(true)
      tags: [cockpit]
