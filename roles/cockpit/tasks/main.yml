- name: Install Cockpit base package
  ansible.builtin.apt:
    name: cockpit
    state: present
    update_cache: false

- name: "Install component: {{ item }}"
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - cockpit-dashboard
    - cockpit-networkmanager
    - cockpit-storaged
    - cockpit-packagekit
    - cockpit-system
    - cockpit-pcp
    - cockpit-sensors
    - cockpit-files
    - cockpit-sosreport
    - cockpit-podman
  failed_when: false

- name: Ensure cockpit.socket is enabled and started
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: true
    state: started

- name: Conditionally allow Cockpit port in UFW
  community.general.ufw:
    rule: "{{ 'allow' if cockpit_public else 'deny' }}"
    port: "{{ cockpit_port }}"
    proto: tcp
  when: cockpit_bind_address in ['0.0.0.0', '::', '127.0.0.1']
