---
- name: Check required borg variables
  ansible.builtin.assert:
    that:
      - borg_enabled | bool
      - borg_repo | length > 0
      - borg_password | length > 0
    fail_msg: "Borg backup disabled or missing borg_repo/borg_password"
    quiet: true
  ignore_errors: true
  register: borg_vars_check

- name: Skip borg if variables are missing
  ansible.builtin.meta: end_host
  when: borg_vars_check is failed

- name: Install borg and borgmatic
  ansible.builtin.apt:
    name:
      - borgbackup
      - borgmatic
    state: present
    update_cache: false

- name: Ensure SSH key exists
  ansible.builtin.stat:
    path: "{{ borg_ssh_key_path }}"
  register: borg_key

- name: Fail if SSH key is missing
  ansible.builtin.fail:
    msg: >
      SSH key not found at {{ borg_ssh_key_path }}.
      Ensure the key exists and is registered with your backup provider.
  when: not borg_key.stat.exists

- name: Create borgmatic config directory
  ansible.builtin.file:
    path: /etc/borgmatic
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy borgmatic config
  ansible.builtin.copy:
    dest: /etc/borgmatic/config.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      source_directories:
      {% for path in borg_source_directories %}
        - {{ path }}
      {% endfor %}

      exclude_patterns:
      {% for pattern in borg_exclude_patterns %}
        - {{ pattern | to_json }}
      {% endfor %}

      repositories:
        - path: {{ borg_repo }}

      encryption_passphrase: "{{ borg_password }}"
      compression: {{ borg_compression }}
      retries: {{ borg_retries }}
      retry_wait: {{ borg_retry_wait }}
      ssh_command: ssh -i {{ borg_ssh_key_path }} -o StrictHostKeyChecking=accept-new

      keep_within: {{ borg_retention.keep_within }}
      keep_daily: {{ borg_retention.keep_daily }}
      keep_weekly: {{ borg_retention.keep_weekly }}
      keep_monthly: {{ borg_retention.keep_monthly }}
      keep_yearly: {{ borg_retention.keep_yearly }}

      before_backup:
        - echo "Starting backup"
      {% for cmd in borg_db_dump_commands %}
        - {{ cmd }}
      {% endfor %}
      {% if borg_ping_url %}

      healthchecks:
        ping_url: {{ borg_ping_url }}
        send_logs: true
        states: {{ borg_ping_states }}
      {% endif %}
  notify: Validate borgmatic

- name: Enable borgmatic systemd timer
  ansible.builtin.systemd:
    name: borgmatic.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Verify borgmatic timer is active
  ansible.builtin.command: systemctl is-active borgmatic.timer
  register: borgmatic_timer
  changed_when: false
  failed_when: borgmatic_timer.stdout != "active"
