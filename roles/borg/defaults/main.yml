---
borg_enabled: true

# SSH key used to authenticate with the backup repo
borg_ssh_key_path: "/home/{{ borg_user | default(new_user) }}/.ssh/id_ed25519"

# Repo & backup target
borg_repo: ''   # e.g. xyz420@xyz420.repo.borgbase.com:repo
borg_password: ''
borg_name: ''
borg_user: ''

# Backup sources
borg_source_directories:
  - /home
  - /etc
  - /var/lib
  - /srv

# Rebuildable paths that would bloat the repo
borg_exclude_patterns:
  - /var/lib/docker
  - /var/lib/containerd
  - '*.log'

# Retention
borg_retention:
  keep_within: 48H
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 12
  keep_yearly: 1

# Compression & ssh
borg_compression: lz4
borg_retries: 3
borg_retry_wait: 60

# Healthchecks (empty = disabled)
borg_ping_url: ''
borg_ping_states: [start, finish, fail]

# Commands run before each backup, e.g. database dumps (set per host)
borg_db_dump_commands: []
