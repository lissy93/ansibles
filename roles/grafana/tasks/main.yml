- name: Skip Grafana role if disabled
  ansible.builtin.meta: end_host
  when: not (grafana_enabled | bool)

- name: Warn and skip if required vars are missing
  ansible.builtin.debug:
    msg: >
      Skipping Grafana role: you must define
      grafana_repo_key_url and grafana_repo
  when:
    - grafana_enabled | bool
    - grafana_repo_key_url is not defined
    - grafana_repo is not defined

- name: End Grafana role because essentials are missing
  ansible.builtin.meta: end_host
  when:
    - grafana_enabled | bool
    - grafana_repo_key_url is not defined
    - grafana_repo is not defined

- name: Ensure apt-transport-https, wget and gnupg are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - wget
      - gnupg
    state: present
    update_cache: false

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download and install Grafana GPG key
  ansible.builtin.shell: |
    set -o pipefail
    rm -f /etc/apt/keyrings/grafana-archive-keyring.gpg
    curl -fsSL {{ grafana_repo_key_url }} | gpg --dearmor -o /etc/apt/keyrings/grafana-archive-keyring.gpg
    chmod 644 /etc/apt/keyrings/grafana-archive-keyring.gpg
  args:
    executable: /bin/bash
  changed_when: false

- name: Add Grafana APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana-archive-keyring.gpg] https://apt.grafana.com stable main"
    filename: grafana
    state: present
    update_cache: true

- name: Install Grafana package
  ansible.builtin.apt:
    name: "{{ grafana_package }}"
    state: present
    update_cache: false

- name: Deploy custom grafana.ini if requested
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: root
    mode: "0644"
  notify: Restart Grafana
  when: grafana_ini | length > 0

- name: "Provision Prometheus datasource"
  ansible.builtin.template:
    src: provisioning/datasources/prometheus.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart Grafana

- name: "Provision Loki datasource"
  ansible.builtin.template:
    src: provisioning/datasources/loki.yml.j2
    dest: /etc/grafana/provisioning/datasources/loki.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart Grafana

- name: "Provision dashboard provider config"
  ansible.builtin.copy:
    src: provisioning/dashboards/
    dest: /etc/grafana/provisioning/dashboards/
    owner: root
    group: root
    mode: "0644"
  notify: Restart Grafana

- name: "Create dashboards directory"
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: "Deploy dashboards"
  ansible.builtin.copy:
    src: dashboards/
    dest: /var/lib/grafana/dashboards/
    owner: grafana
    group: grafana
    mode: "0644"
  notify: Restart Grafana

- name: Create Grafana systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/grafana-server.service.d
    state: directory
    mode: "0755"

- name: Set Grafana resource limits
  ansible.builtin.copy:
    dest: /etc/systemd/system/grafana-server.service.d/limits.conf
    mode: "0644"
    content: |
      [Service]
      MemoryMax=192M
      MemoryHigh=160M
      CPUQuota=50%
  notify: Restart Grafana

- name: Enable and start Grafana service
  ansible.builtin.systemd:
    name: "{{ grafana_service }}"
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Grafana HTTP to be available
  ansible.builtin.uri:
    url: "http://localhost:{{ grafana_port }}/api/health"
    status_code: 200
    return_content: false
    timeout: 10
  register: grafana_health
  retries: 5
  delay: 5
  until: grafana_health.status == 200
  failed_when: grafana_health.status != 200
  changed_when: false
