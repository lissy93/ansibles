---
node_exporter_enabled: true
node_exporter_version: "1.6.1"
node_exporter_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
node_exporter_url: >-
  https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz
node_exporter_install_dir: /opt
node_exporter_user: prometheus
node_exporter_group: prometheus
node_exporter_port: 9100
