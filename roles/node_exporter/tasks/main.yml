---
- name: "Skip node_exporter if disabled"
  ansible.builtin.meta: end_host
  when: not (node_exporter_enabled | bool)

- name: Ensure prometheus user exists
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin

# Older releases print their version to stderr
- name: Check current node_exporter version
  ansible.builtin.command: /usr/local/bin/node_exporter --version
  register: node_exporter_current_version
  changed_when: false
  failed_when: false

- name: Fetch node_exporter
  ansible.builtin.get_url:
    url: "{{ node_exporter_url }}"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "644"
  when: node_exporter_version not in ((node_exporter_current_version.stdout | default('')) + (node_exporter_current_version.stderr | default('')))
  retries: 3
  delay: 5

- name: Unpack node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: "{{ node_exporter_install_dir }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
  when: node_exporter_version not in ((node_exporter_current_version.stdout | default('')) + (node_exporter_current_version.stderr | default('')))

- name: Install node_exporter binary
  ansible.builtin.file:
    src: "{{ node_exporter_install_dir }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    state: link

- name: Create systemd unit for node_exporter
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User={{ node_exporter_user }}
      Group={{ node_exporter_group }}
      ExecStart=/usr/local/bin/node_exporter --web.listen-address=:{{ node_exporter_port }}
      Restart=on-failure
      RestartSec=10
      MemoryMax=32M
      CPUQuota=25%

      [Install]
      WantedBy=multi-user.target
  notify: Reload systemd

- name: Ensure node_exporter is running
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started

# handler to reload systemd
