# whether to run this role
firewall_enabled: true

# if true, run `ufw reset` first
firewall_reset: false

# default policies
firewall_default_incoming_policy: deny    # deny all incoming by default
firewall_default_outgoing_policy: allow   # allow all outgoing by default

# which TCP ports to allow
firewall_allowed_tcp_ports:
  - "{{ ssh_port | default(22) }}"
  - 80
  - 443

# which UDP ports to allow
firewall_allowed_udp_ports: []

# which TCP ports to explicitly deny
firewall_denied_tcp_ports: []

# which UDP ports to explicitly deny
firewall_denied_udp_ports: []

# extra ports to remove when lockdown is true
firewall_lockdown: false

# enable logging ('on', 'off', 'low', 'high', etc)
firewall_logging: "on"

# Legacy variable names for backward compatibility
ufw_enabled: "{{ firewall_enabled }}"
ufw_reset: "{{ firewall_reset }}"
ufw_default_incoming_policy: "{{ firewall_default_incoming_policy }}"
ufw_default_outgoing_policy: "{{ firewall_default_outgoing_policy }}"
ufw_allowed_tcp_ports: "{{ firewall_allowed_tcp_ports }}"
ufw_allowed_udp_ports: "{{ firewall_allowed_udp_ports }}"
ufw_denied_tcp_ports: "{{ firewall_denied_tcp_ports }}"
ufw_denied_udp_ports: "{{ firewall_denied_udp_ports }}"
ufw_lockdown: "{{ firewall_lockdown }}"
ufw_logging: "{{ firewall_logging }}"
